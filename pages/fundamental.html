    <style type="text/tailwindcss">
  @theme inline {

    --color-surface: #2c2c2b; --color-surface-base: #1b1b19; --color-surface-dim: #262624; --color-surface-elevated: #30302e;
    --color-surface-hover: #3e3e38; --color-surface-muted: #4a4a43;
    --color-ink: #faf9f5; --color-ink-secondary: #d8d6cd; --color-ink-muted: #b7b5a9; --color-ink-dim: #908e84;
    --color-ink-faint: #6e6d68; --color-ink-label: #46443b;
    --color-edge: #4a4a43; --color-edge-subtle: #3e3e38; --color-edge-faint: #343430; --color-edge-divider: #2c2c2b;
    --color-edge-primary: #908e84;
    --color-success: #8ca06f; --color-success-bg: #232a1c; --color-success-border: #556640;
    --color-error: #ef4444; --color-error-bg: #3a1f1f; --color-error-border: #93302f;
    --color-warning: #fdd835;
    --color-chart-1: #b05730; --color-chart-2: #9c87f5; --color-chart-3: #1a1915; --color-chart-4: #2f2b48; --color-chart-5: #b4552d;
    --color-background: var(--bg); --color-foreground: var(--text);
    --color-primary: var(--accent); --color-border: var(--border);
    --font-family-display: 'Newsreader', Georgia, ui-serif, serif;
    --font-family-sans: 'Poppins', ui-sans-serif, system-ui, sans-serif;
    --font-family-serif: 'Lora', Georgia, ui-serif, serif;
    --font-family-mono: 'Geist Mono', ui-monospace, monospace;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 24px; --radius-full: 9999px;
    --shadow-xs: 0 1px 3px 0 rgba(0,0,0,0.05); --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
    --shadow-md: 0 1px 3px 0 rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.1); --shadow-lg: 0 1px 3px 0 rgba(0,0,0,0.1), 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-xl: 0 1px 3px 0 rgba(0,0,0,0.1), 0 8px 10px -1px rgba(0,0,0,0.1);
  }
  @layer base {
    body { background: var(--bg); color: var(--text); transition: background-color 0.3s, color 0.3s; }

    html.light .shadow-sm { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06) !important; }
    html.light .shadow-md { box-shadow: 0 2px 4px 0 rgba(0,0,0,0.06), 0 2px 4px -1px rgba(0,0,0,0.04) !important; }
    html.light header { background-color: #ffffff !important; border-color: #e0ddd5 !important; }
    html.light nav { background-color: #ffffff !important; }
    html.light th { background-color: #f0ede6 !important; color: #6e6d68 !important; }
    html.light td { color: #1a1915 !important; }
    html.light input, html.light select, html.light textarea { background-color: #f8f6f1 !important; border-color: #e0ddd5 !important; color: #1a1915 !important; }
    html.light .modal { background-color: #ffffff !important; border-color: #e0ddd5 !important; }
    html.light .form-group label { color: #6e6d68 !important; }
    html.light .form-help { color: #908e84 !important; }
    html.light .info-box { background-color: rgba(196,93,58,0.06) !important; border-color: #c45d3a !important; color: #c45d3a !important; }
    html.light .alert-box { background-color: rgba(204,51,51,0.06) !important; border-color: #cc3333 !important; color: #cc3333 !important; }
    html.light .toast { background-color: #c45d3a !important; }
    html.light .progress-bar { background-color: #e0ddd5 !important; }
    html.light .progress-fill { background: linear-gradient(90deg, #5c7a3e, #c45d3a) !important; }
    html.light .auto-refresh-bar { background-color: #f0ede6 !important; border-color: #e0ddd5 !important; }
    html.light .status-dot.online { background: #5c7a3e !important; box-shadow: 0 0 4px #5c7a3e !important; }
    html.light .status-dot.offline { background: #cc3333 !important; }
    html.light .status-dot.loading { background: #c49600 !important; }
    html.light .signal-green { background: #5c7a3e !important; box-shadow: 0 0 6px #5c7a3e !important; }
    html.light .signal-yellow { background: #c49600 !important; box-shadow: 0 0 6px #c49600 !important; }
    html.light .signal-red { background: #cc3333 !important; box-shadow: 0 0 6px #cc3333 !important; }
    html.light .switch .slider { background: #e0ddd5 !important; border-color: #d0cdc5 !important; }
    html.light .switch .slider:before { background: #908e84 !important; }
    html.light input:checked + .slider { background: #c45d3a !important; border-color: #c45d3a !important; }
    html.light input:checked + .slider:before { background: #ffffff !important; }
    html.light ::-webkit-scrollbar { width: 8px; height: 8px; }
    html.light ::-webkit-scrollbar-track { background: #f0ede6; }
    html.light ::-webkit-scrollbar-thumb { background: #ccc9c0; border-radius: 4px; }
  }
    </style>
    <style>
/* 外部基本面信号面板 */
.external-fund-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-edge-subtle);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
}
.external-fund-panel .panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--color-edge-faint);
}
.external-fund-panel .panel-title {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--color-ink-secondary);
  font-weight: 500;
}
.external-fund-panel .panel-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-ink-dim);
}
.external-fund-panel .panel-metrics {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.external-fund-panel .metric-score {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--color-brand-500);
  line-height: 1;
}
.external-fund-panel .metric-change {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
}
.external-fund-panel .metric-change.up { color: var(--color-success); }
.external-fund-panel .metric-change.down { color: var(--color-error); }
.external-fund-panel .metric-change.flat { color: var(--color-ink-muted); }
/* 档位徽章 - 沿用 Claude 设计 token */
.level-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 9999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.level-badge.level-加仓 { background: var(--color-success-bg); color: var(--color-success); border: 1px solid var(--color-success-border); }
.level-badge.level-底仓 { background: rgba(217,119,87,0.12); color: var(--color-brand-500); border: 1px solid var(--color-brand-500); }
.level-badge.level-不动 { background: var(--color-surface-muted); color: var(--color-ink-muted); border: 1px solid var(--color-edge-subtle); }
.level-badge.level-警惕拥挤 { background: var(--color-error-bg); color: var(--color-error); border: 1px solid var(--color-error-border); }
.external-fund-panel .panel-summary {
  font-size: 12px;
  color: var(--color-ink-muted);
  margin-bottom: 8px;
  padding: 6px 10px;
  background: var(--color-surface-dim);
  border-radius: 6px;
}
.external-fund-panel .panel-alert {
  font-size: 11px;
  color: var(--color-warning);
  margin-bottom: 8px;
  padding: 6px 10px;
  background: rgba(253,216,53,0.08);
  border-radius: 6px;
  border-left: 3px solid var(--color-warning);
}
.external-fund-panel .panel-excerpt {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-ink-dim);
  background: var(--color-surface-dim);
  border-radius: 6px;
  padding: 10px 12px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 240px;
  overflow-y: auto;
  line-height: 1.5;
}
.external-fund-panel .panel-empty {
  text-align: center;
  padding: 16px;
  color: var(--color-ink-dim);
  font-style: italic;
  font-family: var(--font-serif);
  font-size: 13px;
}
    </style>
</head>
<body class="bg-surface-base text-ink font-sans min-h-screen">
<div id="toast" class="toast"></div>

<header class="bg-surface-elevated border-b border-edge-divider px-5 py-3 flex items-center justify-between">
  <h1 class="font-display text-lg text-brand-500 font-medium tracking-tight">
    Sirius <span class="text-ink-muted font-serif italic">期货作战室</span>
  </h1>
  <div class="flex items-center gap-4 text-sm text-ink-muted">
    <span>起始: <span id="headerInitEquity" class="text-ink font-mono">15,000</span> | 目标: <span id="headerTarget" class="text-ink font-mono">1,000,000</span></span>
    <button id="themeBtn" onclick="FTApp.toggleTheme()" title="切换深色/浅色主题" class="flex items-center gap-1 text-ink-dim hover:text-ink text-xs transition-colors duration-300 px-2 py-1 rounded hover:bg-surface-hover"><span id="themeIcon" style="transition:transform 0.3s;display:inline-block">&#9790;</span><span id="themeLabel">深色</span></button>
    </div>
</header>
<div class="sync-bar bg-surface-elevated border-b border-edge px-4 py-1.5 text-xs flex items-center justify-between">
  <span id="syncStatus" class="text-ink-muted"><span class="status-dot offline"></span>云同步: 未配置</span>
  <div class="flex items-center gap-3">
    <span class="text-ink-faint">账户:</span>
    <div class="account-switcher inline-flex rounded-sm border border-edge overflow-hidden">
      <button id="acctBtnSim" onclick="FTApp.switchAccount('sim')" class="px-3 py-0.5 text-xs bg-brand-500 text-brand-50 active">模拟盘</button>
      <button id="acctBtnReal" onclick="FTApp.switchAccount('real')" class="px-3 py-0.5 text-xs bg-surface-base text-ink-muted">实盘</button>
    </div>
    <span id="accountBadge" class="text-ink-muted">模拟盘</span>
  </div>
</div>
<div class="auto-refresh-bar bg-surface border-b border-edge-divider px-5 py-1.5 flex items-center justify-between flex-wrap:wrap gap:2 text-xs text-ink-muted">
  <div class="flex items-center gap-4 flex-wrap:wrap">
    <label class="flex items-center gap-1.5 cursor-pointer">
      <span>自动刷新</span>
      <label class="switch"><input type="checkbox" id="autoRefreshToggle" onchange="FTApp.toggleAutoRefresh()"><span class="slider"></span></label>
    </label>
    <span>间隔: <select id="refreshInterval" onchange="FTApp.updateRefreshInterval()" class="p-0.5 border border-edge rounded text-xs bg-surface text-ink"><option value="60" selected>1分钟</option><option value="300">5分钟</option><option value="1800">30分钟</option><option value="3600">1小时</option></select></span>
    <span id="dataSourceStatus"><span class="status-dot offline"></span>数据源: 手动模式</span>
    <span id="lastUpdateTime">最近更新: --</span>
  </div>
  <button class="bg-brand-500 text-brand-50 px-3 py-1 rounded-sm text-xs font-medium hover:bg-brand-600 transition-colors" onclick="FTApp.fetchPricesNow()">立即刷新</button>
</div>
<nav class="bg-surface-elevated border-b border-edge flex overflow-x-auto">
  <a href="pool.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">观察池</a>
  <a href="fundamental.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors border-b-2 border-brand-500 text-brand-500">基本面</a>
  <a href="signal.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">信号引擎</a>
  <a href="trade.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">模拟交易</a>
  <a href="real-trade.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">实盘录入</a>
  <a href="journal.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">交易日志</a>
  <a href="dashboard.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">仪表盘</a>
  <a href="settings.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">设置</a>
</nav>
<main class="max-w-7xl mx-auto px-5 py-6 page-enter">
  <div class="mb-6">
    <h2 class="font-serif text-xl text-ink-secondary mb-1">基本面分析</h2>
    <p class="text-xs text-ink-dim">五维度评分体系 · 供需/库存/基差/宏观/技术</p>
  </div>
  <!-- Species Selector -->
  <div class="mb-4 flex items-center gap-3">
    <label class="text-sm text-ink-muted font-medium">选择品种:</label>
    <select id="fundSpeciesSelect" onchange="FTRender.loadFundamental()" class="p-2 border border-edge-subtle rounded-sm bg-surface text-ink text-sm font-mono min-w-[120px]">
      <option value="">-- 请选择 --</option>
    </select>
  </div>
  <!-- 外部基本面信号面板（每日日报） -->
  <div id="externalFundPanel" class="external-fund-panel">
    <div class="panel-empty">请先选择品种</div>
  </div>
  <!-- 评分提示区（显示外部数据状态/无数据兜底提示） -->
  <div id="fundHint" class="mb-3 text-xs" style="min-height:18px"></div>
  <!-- 位置定性小结区（基于分位%/COT/基差三数据源翻译为可决策一句话） -->
  <div id="fundPositionSummary" class="mb-3 p-3 rounded-sm border border-edge-subtle bg-surface-dim" style="min-height:48px"></div>
  <!-- 5-Dimension Scoring Table -->
  <div class="bg-surface rounded-lg border border-edge-subtle shadow-sm overflow-hidden mb-4">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-surface-hover">
            <th class="py-2.5 px-4 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">维度</th>
            <th class="py-2.5 px-4 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">启用</th>
            <th class="py-2.5 px-4 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">评分 (1-10)</th>
            <th class="py-2.5 px-4 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">说明</th>
          </tr>
        </thead>
        <tbody id="fundBody" class="divide-y divide-edge-faint">
          <tr data-dim="supply">
            <td class="py-3 px-4 text-ink-secondary font-medium">供需格局</td>
            <td class="py-3 px-4"><label class="switch"><input type="checkbox" id="fundSupplyEnabled" checked onchange="FTRender.onDimToggle('supply')"><span class="slider"></span></label></td>
            <td class="py-3 px-4"><input type="range" min="0" max="10" value="0" id="fundSupply" class="w-full accent-brand-500" oninput="this.nextElementSibling.textContent=this.value;FTRender.updateFundTotal()"><span class="font-mono text-brand-500 text-sm ml-2">—</span></td>
            <td class="py-3 px-4"><input type="text" id="fundSupplyNote" placeholder="供应过剩/紧缺，需求强弱" class="w-full bg-surface-dim border border-edge-faint rounded-sm px-2 py-1 text-xs text-ink-secondary"></td>
          </tr>
          <tr data-dim="inventory">
            <td class="py-3 px-4 text-ink-secondary font-medium">库存水平</td>
            <td class="py-3 px-4"><label class="switch"><input type="checkbox" id="fundInventoryEnabled" checked onchange="FTRender.onDimToggle('inventory')"><span class="slider"></span></label></td>
            <td class="py-3 px-4"><input type="range" min="0" max="10" value="0" id="fundInventory" class="w-full accent-brand-500" oninput="this.nextElementSibling.textContent=this.value;FTRender.updateFundTotal()"><span class="font-mono text-brand-500 text-sm ml-2">—</span></td>
            <td class="py-3 px-4"><input type="text" id="fundInventoryNote" placeholder="交易所库存/社会库存趋势" class="w-full bg-surface-dim border border-edge-faint rounded-sm px-2 py-1 text-xs text-ink-secondary"></td>
          </tr>
          <tr data-dim="basis">
            <td class="py-3 px-4 text-ink-secondary font-medium">基差结构</td>
            <td class="py-3 px-4"><label class="switch"><input type="checkbox" id="fundBasisEnabled" checked onchange="FTRender.onDimToggle('basis')"><span class="slider"></span></label></td>
            <td class="py-3 px-4"><input type="range" min="0" max="10" value="0" id="fundBasis" class="w-full accent-brand-500" oninput="this.nextElementSibling.textContent=this.value;FTRender.updateFundTotal()"><span class="font-mono text-brand-500 text-sm ml-2">—</span></td>
            <td class="py-3 px-4"><input type="text" id="fundBasisNote" placeholder="近远月价差，现货升贴水" class="w-full bg-surface-dim border border-edge-faint rounded-sm px-2 py-1 text-xs text-ink-secondary"></td>
          </tr>
          <tr data-dim="macro">
            <td class="py-3 px-4 text-ink-secondary font-medium">宏观环境</td>
            <td class="py-3 px-4"><label class="switch"><input type="checkbox" id="fundMacroEnabled" checked onchange="FTRender.onDimToggle('macro')"><span class="slider"></span></label></td>
            <td class="py-3 px-4"><input type="range" min="0" max="10" value="0" id="fundMacro" class="w-full accent-brand-500" oninput="this.nextElementSibling.textContent=this.value;FTRender.updateFundTotal()"><span class="font-mono text-brand-500 text-sm ml-2">—</span></td>
            <td class="py-3 px-4"><input type="text" id="fundMacroNote" placeholder="政策/汇率/经济周期" class="w-full bg-surface-dim border border-edge-faint rounded-sm px-2 py-1 text-xs text-ink-secondary"></td>
          </tr>
          <tr data-dim="technical">
            <td class="py-3 px-4 text-ink-secondary font-medium">技术形态</td>
            <td class="py-3 px-4"><label class="switch"><input type="checkbox" id="fundTechnicalEnabled" checked onchange="FTRender.onDimToggle('technical')"><span class="slider"></span></label></td>
            <td class="py-3 px-4"><input type="range" min="0" max="10" value="0" id="fundTechnical" class="w-full accent-brand-500" oninput="this.nextElementSibling.textContent=this.value;FTRender.updateFundTotal()"><span class="font-mono text-brand-500 text-sm ml-2">—</span></td>
            <td class="py-3 px-4"><input type="text" id="fundTechnicalNote" placeholder="趋势/支撑阻力/成交量" class="w-full bg-surface-dim border border-edge-faint rounded-sm px-2 py-1 text-xs text-ink-secondary"></td>
          </tr>
        </tbody>
        <tfoot>
          <tr class="bg-surface-hover">
            <td class="py-3 px-4 text-ink font-semibold" colspan="2">综合评分</td>
            <td class="py-3 px-4 font-mono text-xl font-semibold text-brand-500" id="fundTotalScore">— / 100</td>
            <td class="py-3 px-4">
              <div class="progress-bar" style="height:8px">
                <div id="fundScoreBar" class="progress-fill" style="width:0%"></div>
              </div>
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
  <!-- 数据源开关说明 -->
  <div class="mb-3 text-xs text-ink-dim">数据源开关：禁用某维度后,剩余启用维度权重自动归一化至 100%。至少需启用一个数据源。</div>
  <!-- 拒绝出分原因清单（数据不足时由 updateFundTotal 渲染） -->
  <div id="fundRefuseReasons" class="mb-3"></div>
  <!-- Action Buttons -->
  <div class="flex gap-2 flex-wrap">
    <button class="bg-brand-500 text-brand-50 px-4 py-2 rounded-sm text-sm font-medium hover:bg-brand-600 transition-colors" onclick="FTRender.saveFundamental()">保存评分</button>
    <button class="bg-surface-elevated text-ink-secondary px-4 py-2 rounded-sm text-sm font-medium border border-edge-subtle hover:bg-surface-hover transition-colors" onclick="FTRender.loadFundamental()">重新加载</button>
  </div>
</main>
<script src="../shared/app-core.js"></script>
<script src="../shared/cloud-sync.js"></script>
<script src="../shared/signal-engine.js"></script>
<script src="../shared/trade-engine.js"></script>
<script src="../shared/chart-engine.js"></script>
<script src="../shared/ui-core.js"></script>
<script src="../shared/fund-dimension-config.js"></script>
<script>
// === 基本面评分改造：按数据真实来源分档填充，无来源则留空标注 ===
// 仅覆写 FTRender 的 loadFundamental / updateFundTotal / renderExternalFundSignal，
// 不修改 shared/ui-core.js。FUND_DIMENSION_CONFIG / mapIndicatorToDim 由 shared/fund-dimension-config.js 提供。
(function () {
  'use strict';

  // 简捷取元素（内联脚本作用域私有，避免污染全局）
  var el = function (id) { return document.getElementById(id); };

  // FUND_DIMENSION_CONFIG / mapIndicatorToDim 由 shared/fund-dimension-config.js 全局提供
  var FUND_DIMENSION_CONFIG = window.FUND_DIMENSION_CONFIG;

  // ===== fullReport 解析辅助 =====

  // 提取品种小节：同时匹配 【品种名】 与 【〔轻量〕品种名】
  function parseVarietySection(fullReport, feishuName) {
    if (!fullReport || !feishuName) return '';
    var name = String(feishuName).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('【(?:〔轻量〕)?' + name + '】([\\s\\S]*?)(?=\\n【|\\n━|$)');
    var m = fullReport.match(re);
    return m ? m[1].trim() : '';
  }

  // 解析 active 指标行：NAME  pct  (方向,w=权重) 样本N
  function parseActiveIndicators(section) {
    if (!section) return [];
    var re = /^\s*([A-Z][A-Z0-9_]*)\s+([\d.]+)\s+\(([^,]+),w=([\d.]+)\)/;
    var out = [];
    section.split(/\n/).forEach(function (line) {
      var m = line.match(re);
      if (m) out.push({ name: m[1], pct: parseFloat(m[2]), weight: parseFloat(m[4]), dir: m[3].trim() });
    });
    return out;
  }

  // 解析 COT 持仓拥挤度分位：从日报小节中匹配 "COT_xxx_NET_LONG  数字  ..." 行
  // 用于位置定性的"筹码位置"维度；找不到返回 null
  function parseCotPercentile(section) {
    if (!section) return null;
    var re = /^\s*COT_[A-Z_]*NET_LONG\s+([\d.]+)/;
    var lines = section.split(/\n/);
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(re);
      if (m) return parseFloat(m[1]);
    }
    return null;
  }

  // 解析缺失分项（按指标名去重，日报中 OIL_WTI 常被重复列出）
  function parseMissingItems(section) {
    if (!section) return [];
    var re = /^\s+-\s+([A-Z][A-Z0-9_]*):\s*(.+)$/;
    var seen = {}, out = [];
    section.split(/\n/).forEach(function (line) {
      var m = line.match(re);
      if (m && !seen[m[1]]) { seen[m[1]] = true; out.push({ name: m[1], reason: m[2].trim() }); }
    });
    return out;
  }

  // 解析轻量模组仓单分位
  function parseWarehouseReceipt(section) {
    if (!section) return null;
    var m = section.match(/仓单分位:\s*([\d.]+)/);
    return m ? parseFloat(m[1]) : null;
  }

  // mapIndicatorToDim 由 shared/fund-dimension-config.js 全局提供（前缀匹配，已按长度降序）

  // 维度内加权得分：Σ(pct_or_100-pct × w)/Σw/10，反向取 100-pct
  function computeDimScore(indicators) {
    if (!indicators || !indicators.length) return null;
    var num = 0, den = 0;
    indicators.forEach(function (ind) {
      var eff = (ind.dir === '反向') ? (100 - ind.pct) : ind.pct;
      num += eff * ind.weight;
      den += ind.weight;
    });
    if (den <= 0) return null;
    var s = num / den / 10;
    if (s < 0) s = 0;
    if (s > 10) s = 10;
    return Math.round(s * 10) / 10;
  }

  function formatIndicatorNote(indicators) {
    return indicators.map(function (ind) { return ind.name + ' ' + ind.pct.toFixed(1); }).join(', ');
  }

  // 按维度归组 active 指标
  function groupIndicatorsByDim(indicators) {
    var groups = { macro: [], supply: [], inventory: [], basis: [], technical: [] };
    (indicators || []).forEach(function (ind) {
      var d = mapIndicatorToDim(ind.name);
      if (d && groups[d]) groups[d].push(ind);
    });
    return groups;
  }

  // 设置某个维度 input + span + note
  function setDim(dim, score, spanText, note, opts) {
    var sInp = el(dim.inputId), nInp = el(dim.noteId);
    if (!sInp) return;
    var disabled = !!(opts && opts.disabled);
    sInp.disabled = disabled;
    sInp.value = score;
    if (sInp.nextElementSibling) {
      sInp.nextElementSibling.textContent = spanText;
      sInp.nextElementSibling.style.color = (opts && opts.gray) ? '#6e6d68' : '';
    }
    if (nInp) {
      nInp.disabled = disabled;
      nInp.value = note;
    }
    // 同步"启用"开关状态(模板禁用时勾去,模板启用时勾上)
    var cap = dim.key.charAt(0).toUpperCase() + dim.key.slice(1);
    var enabledCb = el('fund' + cap + 'Enabled');
    if (enabledCb) {
      enabledCb.checked = !disabled;
      // 模板禁用的维度,用户不应能强制开启(避免数据缺失还硬出分)
      enabledCb.disabled = disabled;
    }
    // 行级灰显
    var row = sInp.closest('tr');
    if (row) row.style.opacity = disabled ? '0.5' : '';
  }

  // ===== Task 2.5: 位置定性小结（基于分位%/COT/基差三数据源翻译为可决策一句话） =====
  function renderPositionSummary(symbol, template) {
    var box = el('fundPositionSummary');
    if (!box) return;
    // 观察层品种：显示"仅行情观察未纳入评分"
    if (template === 'observe' || (symbol && FTApp.getVarietyTier && FTApp.getVarietyTier(symbol) === '观察')) {
      box.innerHTML = '<div class="text-xs text-ink-muted">📋 <span class="font-medium text-ink-secondary">位置定性：</span>仅行情观察，未纳入基本面评分</div>';
      return;
    }
    if (!symbol) { box.innerHTML = ''; return; }

    // 1. 估值位置：取分位%
    // 修复点：原逻辑只读 pool.percentile，但基本面页加载时若行情未刷新，price=0 → percentile=0 → 误判"数据不足"
    // 新逻辑：① 优先用 pool.percentile（若>0）；② 否用 computePercentile(symbol, pool.price) 实时算（若 price>0）；
    //        ③ 若 price 也为 0（基本面页未刷行情），用 priceHistory.avg 作中位估值（(avg-low)/(high-low)*100）作参考
    var poolEntry = FTApp.state.pool.find(function (c) { return c.symbol === symbol; });
    var pct = (poolEntry && poolEntry.percentile > 0) ? poolEntry.percentile : null;
    var valuationSource = '';
    if (pct == null && poolEntry && poolEntry.price > 0 && typeof computePercentile === 'function') {
      var livePct = computePercentile(symbol, poolEntry.price);
      if (livePct != null && livePct > 0) { pct = livePct; valuationSource = '（实时）'; }
    }
    if (pct == null) {
      // 行情未拉到：用 priceHistory.avg 作中位估值参考
      var ph = (typeof FTApp.priceHistory === 'function') ? FTApp.priceHistory() : FTApp.priceHistory;
      if (ph && ph.records) {
        var rec = ph.records.find(function (r) { return r.symbol === symbol; });
        if (rec && rec.avg && rec.low && rec.high && rec.high > rec.low) {
          pct = Math.round((rec.avg - rec.low) / (rec.high - rec.low) * 100);
          valuationSource = '（均值参考）';
        }
      }
    }
    var valuationText, valuationTag;
    if (pct == null || pct === 0) {
      valuationText = '估值数据不足'; valuationTag = 'muted';
    } else if (pct <= 25) {
      valuationText = '估值低位（分位 ' + pct + '%' + valuationSource + '，赔率好）'; valuationTag = 'good';
    } else if (pct <= 75) {
      valuationText = '估值中性（分位 ' + pct + '%' + valuationSource + '）'; valuationTag = 'neutral';
    } else {
      valuationText = '估值高位（分位 ' + pct + '%' + valuationSource + '，赔率差）'; valuationTag = 'bad';
    }

    // 2. 筹码位置：解析日报 fullReport 中的 COT_xxx_NET_LONG 分位
    var feed = window.__fundFeed;
    var record = (feed && feed.records && feed.records.length) ? feed.records[0] : null;
    var feishuName = (FTApp.PROJECT_TO_FEISHU_MAP && FTApp.PROJECT_TO_FEISHU_MAP[symbol]) || symbol;
    var section = (record && record.fullReport) ? parseVarietySection(record.fullReport, feishuName) : '';
    var cotPct = parseCotPercentile(section);
    var positionText, positionTag;
    if (cotPct == null) {
      positionText = '筹码数据不足'; positionTag = 'muted';
    } else if (cotPct >= 85) {
      positionText = '筹码拥挤（COT ' + cotPct.toFixed(0) + '%，反噬风险）'; positionTag = 'bad';
    } else if (cotPct <= 30) {
      positionText = '筹码不拥挤（COT ' + cotPct.toFixed(0) + '%）'; positionTag = 'good';
    } else {
      positionText = '筹码中性（COT ' + cotPct.toFixed(0) + '%）'; positionTag = 'neutral';
    }

    // 3. 现货强弱：basis 维度评分（已由 loadFundamental 填入 fundBasis input.value，范围 0-10）
    //    >=6 视为现货偏强；<=4 视为现货偏弱；0/缺失 → "数据不足"
    var basisDim = el('fundBasis');
    var basisScore = basisDim ? parseFloat(basisDim.value || '0') : 0;
    var basisNoteEl = el('fundBasisNote');
    var basisNoteTxt = basisNoteEl ? basisNoteEl.value : '';
    var basisText, basisTag;
    if (!basisScore || basisScore === 0) {
      basisText = '现货数据不足'; basisTag = 'muted';
    } else if (basisScore >= 6) {
      basisText = '现货偏强（基差维度 ' + basisScore + '）'; basisTag = 'good';
    } else if (basisScore <= 4) {
      basisText = '现货偏弱（基差维度 ' + basisScore + '）'; basisTag = 'bad';
    } else {
      basisText = '现货中性（基差维度 ' + basisScore + '）'; basisTag = 'neutral';
    }

    // 4. 综合结论
    var tags = [valuationTag, positionTag, basisTag];
    var goodCnt = tags.filter(function (t) { return t === 'good'; }).length;
    var badCnt = tags.filter(function (t) { return t === 'bad'; }).length;
    var mutedCnt = tags.filter(function (t) { return t === 'muted'; }).length;
    var conclusion, conclusionColor;
    if (mutedCnt >= 2) {
      conclusion = '数据不足，观望'; conclusionColor = '#908e84';
    } else if (goodCnt >= 2 && badCnt === 0) {
      conclusion = '赔率占优，可关注'; conclusionColor = '#8ca06f';
    } else if (badCnt >= 2) {
      conclusion = '风险升高，观望'; conclusionColor = '#ef4444';
    } else {
      conclusion = '中性，观望'; conclusionColor = '#d4b656';
    }

    // 5. 渲染：三段 + 箭头 + 结论
    var tagColor = { good: '#8ca06f', neutral: '#d4b656', bad: '#ef4444', muted: '#908e84' };
    function span(tag, txt) { return '<span style="color:' + tagColor[tag] + '">' + txt + '</span>'; }
    box.innerHTML =
      '<div class="text-xs">' +
        '<span class="font-medium text-ink-secondary">位置定性：</span>' +
        span(valuationTag, valuationText) + ' · ' +
        span(positionTag, positionText) + ' · ' +
        span(basisTag, basisText) +
        ' <span class="text-ink-muted">→</span> ' +
        '<span class="font-medium" style="color:' + conclusionColor + '">' + conclusion + '</span>' +
      '</div>';
  }

  // ===== Task 3: 覆写 loadFundamental =====
  FTRender.loadFundamental = function () {
    var sel = el('fundSpeciesSelect');
    var sym = sel ? sel.value : '';
    var cfg = FUND_DIMENSION_CONFIG;
    var dims = cfg.dimensions;
    var feed = window.__fundFeed;
    var record = (feed && feed.records && feed.records.length) ? feed.records[0] : null;

    // 先重置所有维度到默认
    dims.forEach(function (dim) { setDim(dim, 0, '0', '', { disabled: false }); });

    if (!sym) {
      var h0 = el('fundHint'); if (h0) h0.innerHTML = '';
      // 空状态：五维显示"—"，消除 0 分旧刻度
      dims.forEach(function (dim) { setDim(dim, 0, '—', '', { disabled: false }); });
      FTRender._currentFundState = { sym: '', feishuName: '', template: null, activeIndicators: [], missingItems: [], warehousePct: null };
      this.updateFundTotal();
      this.renderExternalFundSignal();
      renderPositionSummary('');
      return;
    }

    // 观察层短路：仅行情观察，不进基本面评分
    if (FTApp.getVarietyTier && FTApp.getVarietyTier(sym) === '观察') {
      dims.forEach(function (dim) { setDim(dim, 0, '—', '仅行情观察，未纳入基本面评分', { disabled: true, gray: true }); });
      var hintObs = el('fundHint');
      if (hintObs) hintObs.innerHTML = '<span style="color:#908e84">📋 ' + FTApp.escapeHtml(sym) + ' 为观察层品种，仅跟踪行情与分位%，不参与五维基本面评分</span>';
      FTRender._currentFundState = { sym: sym, feishuName: sym, template: 'observe', activeIndicators: [], missingItems: [], warehousePct: null };
      this.updateFundTotal();
      this.renderExternalFundSignal();
      renderPositionSummary(sym, 'observe');
      return;
    }

    var feishuName = (FTApp.PROJECT_TO_FEISHU_MAP && FTApp.PROJECT_TO_FEISHU_MAP[sym]) || sym;
    var section = (record && record.fullReport) ? parseVarietySection(record.fullReport, feishuName) : '';
    var activeIndicators = parseActiveIndicators(section);
    var missingItems = parseMissingItems(section);
    var warehousePct = parseWarehouseReceipt(section);
    var templateName = cfg.varietyTemplates[sym] || cfg.varietyTemplates[feishuName] || 'agri';
    var extV = (record && record.varieties) ? record.varieties[feishuName] : null;
    var extScore = extV ? extV.score : null;
    var fund = (FTApp.state && FTApp.state.fundamentals) ? (FTApp.state.fundamentals[sym] || {}) : {};
    var hint = el('fundHint');

    // 无 record / 无小节：全部"无数据源"
    if (!record || !section) {
      dims.forEach(function (dim) { setDim(dim, 0, '—', '无数据源', { disabled: false }); });
      if (hint) hint.innerHTML = '<span style="color:#e08d6f">⚠ ' + FTApp.escapeHtml(sym) + ' 无外部日报小节，请手动填写各维度评分</span>';
      FTRender._currentFundState = { sym: sym, feishuName: feishuName, template: templateName, activeIndicators: activeIndicators, missingItems: missingItems, warehousePct: warehousePct };
      this.updateFundTotal();
      this.renderExternalFundSignal();
      renderPositionSummary(sym, templateName);
      return;
    }

    var groups = groupIndicatorsByDim(activeIndicators);

    if (templateName === 'lightweight') {
      // 轻量模组：全部 disabled，hint 显示仓单分位
      dims.forEach(function (dim) { setDim(dim, 0, '—', '⚠ 轻量模组，仅供参考', { disabled: true, gray: true }); });
      if (hint) {
        hint.innerHTML = '<span style="color:#fdd835">⚠ 轻量模组，仅供参考 · 仓单分位: ' + (warehousePct != null ? warehousePct.toFixed(1) : '--') + '</span>';
      }
    } else if (templateName === 'metal') {
      var tpl = cfg.templates.metal;
      var grayOut = tpl.grayOut || [];
      dims.forEach(function (dim) {
        if (grayOut.indexOf(dim.key) >= 0) {
          setDim(dim, 0, '无品种级数据源', '无品种级数据源', { disabled: true, gray: true });
        } else {
          // macro 维度亮分
          var inds = groups[dim.key] || [];
          if (inds.length > 0) {
            var sc = computeDimScore(inds);
            setDim(dim, sc, String(sc), formatIndicatorNote(inds), { disabled: false });
          } else {
            var saved = fund[dim.key] || {};
            var ms = (saved.score != null) ? saved.score : 0;
            setDim(dim, ms, ms > 0 ? String(ms) : '—', saved.note || '无数据源', { disabled: false });
          }
        }
      });
      if (hint) {
        hint.innerHTML = '<span style="color:#b7b5a9">📊 外部日报：' + FTApp.escapeHtml(sym) + (extScore != null ? ' 综合分 ' + extScore.toFixed(1) : '') + ' · ' + FTApp.escapeHtml(tpl.note) + '</span>';
      }
    } else {
      // agri（默认）
      dims.forEach(function (dim) {
        var inds = groups[dim.key] || [];
        if (inds.length > 0) {
          var sc = computeDimScore(inds);
          setDim(dim, sc, String(sc), formatIndicatorNote(inds), { disabled: false });
        } else if (dim.key === 'basis' || dim.key === 'technical') {
          // basis/technical 始终"待手动输入"，回填手动保存值
          var saved = fund[dim.key] || {};
          var ms = (saved.score != null) ? saved.score : 0;
          setDim(dim, ms, ms > 0 ? String(ms) : '—', saved.note || '待手动输入', { disabled: false });
        } else {
          setDim(dim, 0, '—', '无数据源', { disabled: false });
        }
      });
      if (hint) {
        hint.innerHTML = '<span style="color:#8ca06f">📊 外部日报：' + FTApp.escapeHtml(sym) + (extScore != null ? ' 综合分 ' + extScore.toFixed(1) : '') + ' · 供需/库存/宏观维度已按数据来源填充，基差/技术形态待手动输入</span>';
      }
    }

    FTRender._currentFundState = { sym: sym, feishuName: feishuName, template: templateName, activeIndicators: activeIndicators, missingItems: missingItems, warehousePct: warehousePct };
    this.updateFundTotal();
    this.renderExternalFundSignal();
    renderPositionSummary(sym, templateName);
  };

  // ===== 用户启用/禁用数据源开关 =====
  // 切换某维度启用状态 → 重新归一化权重并刷新评分
  // 若当前为最后一个启用维度且用户尝试关闭,阻止并提示
  FTRender.onDimToggle = function (dimKey) {
    var dim = FUND_DIMENSION_CONFIG.dimensions.find(function (d) { return d.key === dimKey; });
    if (!dim) return;
    var cap = dimKey.charAt(0).toUpperCase() + dimKey.slice(1);
    var cb = el('fund' + cap + 'Enabled');
    if (!cb) return;
    // 统计当前用户启用的维度数(排除模板禁用)
    var userEnabledCount = 0;
    FUND_DIMENSION_CONFIG.dimensions.forEach(function (d) {
      var dc = d.key.charAt(0).toUpperCase() + d.key.slice(1);
      var ccb = el('fund' + dc + 'Enabled');
      if (ccb && !ccb.disabled && ccb.checked) userEnabledCount++;
    });
    // 阻止禁用最后一个启用维度
    if (!cb.checked && userEnabledCount === 0) {
      cb.checked = true;
      FTApp.showToast('请至少启用一个数据源');
      return;
    }
    // 应用 disabled 状态到对应 input + note
    var sInp = el(dim.inputId);
    var nInp = el(dim.noteId);
    if (sInp) sInp.disabled = !cb.checked;
    if (nInp) nInp.disabled = !cb.checked;
    var row = sInp && sInp.closest('tr');
    if (row) row.style.opacity = cb.checked ? '' : '0.5';
    this.updateFundTotal();
  };

  // ===== Task 4: 覆写 updateFundTotal =====
  FTRender.updateFundTotal = function () {
    var cfg = FUND_DIMENSION_CONFIG;
    var st = FTRender._currentFundState || {};
    var tot = el('fundTotalScore');
    var bar = el('fundScoreBar');
    var reasons = el('fundRefuseReasons');

    // 无选择 / 无模板
    if (!st.sym || !st.template) {
      if (tot) { tot.textContent = '— / 100'; tot.style.color = ''; }
      if (bar) { bar.style.width = '0%'; bar.style.background = ''; }
      if (reasons) reasons.innerHTML = '';
      return;
    }

    // 轻量模板：不计算归一化分
    if (st.template === 'lightweight') {
      var wpct = st.warehousePct;
      if (tot) { tot.textContent = (wpct != null) ? ('轻量模组 · 仓单分位 ' + wpct.toFixed(1)) : '轻量模组 · —'; tot.style.color = '#908e84'; }
      if (bar) { bar.style.width = '0%'; bar.style.background = '#4a4a43'; }
      if (reasons) reasons.innerHTML = '';
      return;
    }

    // 观察层模板：不参与五维评分
    if (st.template === 'observe') {
      if (tot) { tot.textContent = '观察层 · 未纳入评分'; tot.style.color = '#908e84'; }
      if (bar) { bar.style.width = '0%'; bar.style.background = '#4a4a43'; }
      if (reasons) reasons.innerHTML = '';
      return;
    }

    // agri / metal：按模板权重归一化
    // 拒绝出分闸门（全局统一，不因品种类别豁免）：
    //   主判定 = 有效维度个数占比 < refuseThreshold → 拒绝（与用户口径"5维中2维有效=40%"一致）
    //   辅判定 = 有效权重占比 < refuseThreshold → 拒绝（保留原逻辑兜底）
    //   二者满足其一即拒绝。修复点：原逻辑只看权重占比，agri 模板 supply(0.35)+inventory(0.30)=0.65>0.5 不触发，
    //   但实际 5 维仅 2 维有效(40%)，应触发拒绝。改为维度个数占比主导。
    var tpl = cfg.templates[st.template] || cfg.templates.agri;
    var dimWeights = tpl.dims || {};
    var totalWeight = 0, validWeight = 0, weightedSum = 0;
    var totalDimCount = 0, validDimCount = 0;
    var missingDims = [];
    cfg.dimensions.forEach(function (dim) {
      var w = dimWeights[dim.key];
      if (w == null) return; // 该模板不含此维度
      totalWeight += w;
      totalDimCount++;
      var sInp = el(dim.inputId);
      var val = sInp ? (+sInp.value || 0) : 0;
      var disabled = sInp ? sInp.disabled : false;
      var hasActive = (st.activeIndicators || []).some(function (ind) { return mapIndicatorToDim(ind.name) === dim.key; });
      var isValid = (val > 0 && !disabled) || hasActive;
      if (isValid) {
        validWeight += w;
        validDimCount++;
        weightedSum += val * w;
      } else {
        missingDims.push(dim);
      }
    });

    // 双闸门：维度个数占比 OR 权重占比，任一 < 阈值即拒绝
    var dimRatio = totalDimCount > 0 ? (validDimCount / totalDimCount) : 0;
    var weightRatio = totalWeight > 0 ? (validWeight / totalWeight) : 0;
    var refuse = (totalWeight <= 0) || (validWeight <= 0) ||
                 (dimRatio < cfg.refuseThreshold) || (weightRatio < cfg.refuseThreshold);
    if (refuse) {
      // 拒绝出分提示：按模板区分有效维度摘要
      // - metal：仅宏观有效，附宏观情绪分
      // - agri：列出有效维度 + 缺失维度（如"供需库存强、待补基差宏观"），让用户看清信号结构
      var refuseText = '数据不足·拒绝出分';
      if (st.template === 'metal') {
        var macroInp = el('fundMacro');
        // 优先取维度 span 文本（保留小数；range input 默认 step=1 会把 7.4 截成 7）
        var macroSpan = macroInp && macroInp.nextElementSibling ? macroInp.nextElementSibling.textContent : '';
        var mv = parseFloat(macroSpan);
        if (!(mv > 0)) mv = macroInp ? (+macroInp.value || 0) : 0;
        if (mv > 0) refuseText = '数据不足·拒绝出分（仅宏观情绪分 ' + mv.toFixed(1) + '，不代表品种基本面）';
      } else if (st.template === 'agri' && validDimCount > 0) {
        // 提取有效维度名 + 缺失维度名，生成摘要
        var validNames = [], missingNames = [];
        cfg.dimensions.forEach(function (dim) {
          if (dimWeights[dim.key] == null) return;
          var sInp = el(dim.inputId);
          var val = sInp ? (+sInp.value || 0) : 0;
          var disabled = sInp ? sInp.disabled : false;
          var hasActive = (st.activeIndicators || []).some(function (ind) { return mapIndicatorToDim(ind.name) === dim.key; });
          var isValid = (val > 0 && !disabled) || hasActive;
          if (isValid) validNames.push(dim.name);
          else missingNames.push(dim.name);
        });
        if (validNames.length && missingNames.length) {
          refuseText = '数据不足·拒绝出分（' + validNames.join('') + '有效，待补' + missingNames.join('') + '）';
        }
      }
      if (tot) { tot.textContent = refuseText; tot.style.color = '#908e84'; }
      if (bar) { bar.style.width = '0%'; bar.style.background = '#4a4a43'; }
      if (reasons) {
        var items = st.missingItems || [];
        var parts = [];
        items.forEach(function (it) { parts.push(FTApp.escapeHtml(it.name) + '：' + FTApp.escapeHtml(it.reason)); });
        missingDims.forEach(function (d) { parts.push(FTApp.escapeHtml(d.name) + ' 无数据源'); });
        // 补充维度占比信息
        var ratioInfo = '有效维度 ' + validDimCount + '/' + totalDimCount + '（' + Math.round(dimRatio * 100) + '%）< 阈值 50%';
        reasons.innerHTML = '<div style="font-size:12px;color:#ef4444;margin-top:6px"><strong>缺失项：</strong>' + parts.join('；') + '</div>' +
          '<div style="font-size:11px;color:#908e84;margin-top:4px">' + ratioInfo + '</div>';
      }
    } else {
      var score = (weightedSum / validWeight) * 10;  // 0-100
      score = Math.round(score * 10) / 10;
      if (tot) { tot.textContent = score.toFixed(1) + ' / 100'; tot.style.color = ''; }
      if (bar) { bar.style.width = score + '%'; bar.style.background = ''; }
      if (reasons) reasons.innerHTML = '';
    }
  };

  // ===== Task 5: 覆写 renderExternalFundSignal =====
  FTRender.renderExternalFundSignal = function () {
    var panel = el('externalFundPanel');
    var sel = el('fundSpeciesSelect');
    if (!panel) return;
    var sym = sel ? sel.value : '';
    if (!sym) { panel.innerHTML = ''; return; }
    var feed = window.__fundFeed;
    if (!feed || !feed.records || !feed.records.length) {
      panel.innerHTML = '<div class="info-box">外部数据加载中或不可用</div>';
      return;
    }
    var record = feed.records[0];
    var feishuName = (FTApp.PROJECT_TO_FEISHU_MAP && FTApp.PROJECT_TO_FEISHU_MAP[sym]) || sym;
    var v = record.varieties && record.varieties[feishuName];

    // 数据新鲜度角标：按 record.date 与今天差值分档
    var freshnessHtml = '';
    if (record.date) {
      var d = new Date(record.date + 'T00:00:00');
      var today = new Date();
      var days = Math.floor((today - d) / 86400000);
      if (!isNaN(days)) {
        var color = days <= 3 ? '#908e84' : (days <= 7 ? '#fdd835' : '#ef4444');
        var label = days <= 0 ? '实时' : ('滞后 ' + days + ' 天');
        freshnessHtml = '<span id="fundFreshnessBadge" style="margin-left:8px;font-size:11px;color:' + color + '">' + label + '</span>';
      }
    }

    if (!v) {
      panel.innerHTML = '<div class="info-box">该品种暂无外部日报数据' + freshnessHtml + '</div>';
      return;
    }

    // 档位徽章颜色映射
    var levelColors = { '加仓': '#8ca06f', '底仓': '#d97757', '不动': '#908e84', '警惕拥挤': '#ef4444' };
    var lvlColor = levelColors[v.level] || '#908e84';
    // 变化箭头
    var ch = v.change;
    var changeHtml;
    if (ch == null || ch === 0) {
      changeHtml = '<span style="color:#908e84">→0.0</span>';
    } else if (ch > 0) {
      changeHtml = '<span style="color:#8ca06f">↑' + ch.toFixed(1) + '</span>';
    } else {
      changeHtml = '<span style="color:#ef4444">↓' + Math.abs(ch).toFixed(1) + '</span>';
    }
    // 品种小节摘录（支持〔轻量〕前缀，原正则不匹配轻量标题）
    var excerpt = parseVarietySection(record.fullReport || '', feishuName);

    var html = '<div style="font-family:Lora,Georgia,serif;color:#d8d6cd;font-size:14px;margin-bottom:8px">外部基本面信号（每日日报 · ' +
      FTApp.escapeHtml(record.date || '') + ' ' + FTApp.escapeHtml(record.weekday || '') + '）' + freshnessHtml + '</div>';
    html += '<div style="margin-bottom:6px">' +
      '<span class="level-badge" style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:600;background:' + lvlColor + '22;color:' + lvlColor + ';border:1px solid ' + lvlColor + '">' + FTApp.escapeHtml(v.level || '') + '</span> ' +
      '<span style="margin-left:10px;font-family:\'Geist Mono\',monospace;color:#faf9f5">分数 ' + (v.score != null ? v.score.toFixed(1) : '--') + '</span> ' +
      '<span style="margin-left:10px;font-family:\'Geist Mono\',monospace">' + changeHtml + '</span>' +
      '</div>';
    if (record.summary) {
      html += '<div style="font-size:12px;color:#b7b5a9;margin-bottom:6px">今日概况：' + FTApp.escapeHtml(record.summary) + '</div>';
    }
    // anomalyAlert 去重：按指标名（取 ":" 或空格前的部分）去重，重复条目只渲染一次
    if (record.anomalyAlert && record.anomalyAlert !== '无') {
      var parts = record.anomalyAlert.split(';').map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 0; });
      var seen = {}, deduped = [];
      parts.forEach(function (p) {
        var key = p.split(/[:\s]/)[0];
        if (!seen[key]) { seen[key] = true; deduped.push(p); }
      });
      if (deduped.length > 0) {
        html += '<div class="panel-alert">⚠ ' + FTApp.escapeHtml(deduped.join('；')) + '</div>';
      }
    }
    if (excerpt) {
      html += '<pre style="white-space:pre-wrap;background:#262624;border:1px solid #3e3e38;border-radius:8px;padding:10px;font-size:11px;color:#b7b5a9;font-family:\'Geist Mono\',monospace;max-height:260px;overflow:auto;margin-top:6px">' + FTApp.escapeHtml(excerpt) + '</pre>';
    }
    panel.innerHTML = html;
  };
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  // 每个初始化步骤独立 try-catch，避免单个失败中断整个初始化链
  var safe = function(name, fn) { try { fn(); } catch(e) { console.error('[FT] 初始化失败:', name, e); } };
  var safeAsync = async function(name, fn) { try { await fn(); } catch(e) { console.error('[FT] 初始化失败:', name, e); } };
  safe('initTheme', function(){ FTApp.initTheme(); });
  safe('loadState', function(){ FTApp.loadState(); });
  safe('loadSettings', function(){ FTApp.loadSettings(); });
  safe('initAutoRefresh', function(){ FTApp.initAutoRefresh(); });
  safe('initAutoBackup', function(){ FTApp.initAutoBackup(); });
  safe('updateBackupDisplay', function(){ FTApp.updateBackupDisplay(); });
  safe('populateFundSelect', function(){ FTApp.populateFundSelect(); });
  // 异步加载飞书日报基本面数据
  await safeAsync('loadFundamentalFeed', function(){ return FTRender.loadFundamentalFeed(); });
  // 加载历史价格区间和成本参考（loadFundamental 需要 percentile 数据推算估值维度）
  await safeAsync('loadPriceHistory', function(){ return FTApp.loadPriceHistory(); });
  await safeAsync('loadCostReference', function(){ return FTApp.loadCostReference(); });
  safe('ensurePercentileComputed', function(){ FTApp.ensurePercentileComputed(); });
  safe('loadFundamental', function(){ FTRender.loadFundamental(); });
  safe('renderExternalFundSignal', function(){ FTRender.renderExternalFundSignal(); });
});
</script>
